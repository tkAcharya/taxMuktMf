<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAS Analyzer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <span class="logo-icon">₹</span>
        <div>
          <div class="logo-title">CAS Analyzer</div>
          <div class="logo-sub">MF Portfolio · LTCG Calculator</div>
        </div>
      </div>
      <button id="resetBtn" class="btn-icon" title="Reset" style="display:none">↺</button>
    </header>

    <!-- Tab bar (hidden until parsed) -->
    <nav class="tabs" id="tabs" style="display:none">
      <button class="tab active" data-tab="portfolio">Portfolio</button>
      <button class="tab" data-tab="ltcg">LTCG Harvesting</button>
      <button class="tab" data-tab="raw">Raw Data</button>
    </nav>

    <!-- Upload screen -->
    <section id="uploadScreen" class="screen">
      <div class="upload-zone" id="dropZone">
        <div class="upload-icon-wrap">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9,15 12,12 15,15"/>
          </svg>
        </div>
        <p class="upload-title">Drop your CAS PDF here</p>
        <p class="upload-hint">CAMS · Karvy · MFCentral · NSDL</p>
        <label class="btn btn-primary upload-browse" for="fileInput">Browse file</label>
        <input type="file" id="fileInput" accept=".pdf" style="display:none" />
      </div>
      <div class="info-note">
        <span class="info-dot"></span>
        PDF is parsed entirely in your browser — nothing leaves your device.
      </div>
    </section>

    <!-- Parsing screen -->
    <section id="parsingScreen" class="screen" style="display:none">
      <div class="parsing-wrap">
        <div class="spinner"></div>
        <p class="parsing-title" id="parsingTitle">Reading PDF…</p>
        <p class="parsing-sub" id="parsingSub">Extracting text with PDF.js</p>
        <div class="parse-log" id="parseLog"></div>
      </div>
    </section>

    <!-- Results: Portfolio tab -->
    <section id="portfolioScreen" class="screen" style="display:none">
      <div class="metrics-grid" id="metricsGrid"></div>
      <div id="holdingsTable"></div>
    </section>

    <!-- Results: LTCG tab -->
    <section id="ltcgScreen" class="screen" style="display:none">
      <div class="ltcg-settings card" id="ltcgSettings"></div>
      <div id="ltcgResults"></div>
    </section>

    <!-- Results: Raw tab -->
    <section id="rawScreen" class="screen" style="display:none">
      <pre id="rawText" class="raw-text"></pre>
    </section>

    <!-- Error screen -->
    <section id="errorScreen" class="screen" style="display:none">
      <div class="error-wrap">
        <div class="error-icon">✕</div>
        <p class="error-title">Could not parse this PDF</p>
        <p class="error-sub" id="errorMsg"></p>
        <button class="btn btn-primary" id="tryAgainBtn">Try another file</button>
      </div>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
